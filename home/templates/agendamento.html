{% extends 'base.html' %}
{% block content %}
{% load static %}
{% csrf_token %}

<input type="hidden" id="servicoId" value="{{ servico_id }}">
<input type="hidden" id="servicoNome" value="{{ servico_nome }}">
<input type="hidden" id="servicoTempo" value="{{ servico_tempo }}">

<div class="agendamento_total">

    <div>
        <img class="logo1-img" src="{% static 'img/logo.png' %}">
    </div>

    <div class="agendamento_servico">
        <p>Agendar: {{ servico_nome }}</p>
        <a class="adomudarservico" href="{% url 'home' %}">Mudar serviço</a>
    </div>

    <!-- DIAS -->
    <div class="agendamento_dia">
        <p>DIA</p>

        <div class="dias-container">
            {% for d in dias %}
                <div class="dia-card"
                     data-data="{{ d.data|date:'Y-m-d' }}"
                     onclick="selecionarDia(this)">

                    <span class="dia-semana">{{ d.dia_semana }}</span>

                    <div class="dia-data">
                        <span class="dia-numero">{{ d.dia }}</span>
                        <span class="dia-mes">/{{ d.mes }}</span>
                    </div>

                </div>
            {% endfor %}
        </div>
    </div>

    <!-- BARBEIROS -->
    <div class="agendamento_barbeiro">
        <p>BARBEIRO</p>

        <div class="barbeiros-container">
            {% for b in barbeiros %}
                <div class="barbeiro-card"
                     data-barbeiro="{{ b.id }}"
                     onclick="selecionarBarbeiro(this)">

                    <img src="{% static 'img/' %}{{ b.nome }}.png">

                    <span class="barbeiro-nome">{{ b.nome }}</span>

                </div>
            {% endfor %}
        </div>
    </div>

    <!-- HORÁRIOS -->
    <div class="agendamento_horarios">
        <h3>HORÁRIOS</h3>
        <div id="agenda"></div>
    </div>

</div>


<script>

let diaSelecionado = null
let barbeiroSelecionado = null


function selecionarDia(el){

    document.querySelectorAll('.dia-card')
    .forEach(d => d.classList.remove('selecionado'))

    el.classList.add('selecionado')

    diaSelecionado = el.dataset.data

    tentarCarregarAgenda()
}


function selecionarBarbeiro(el){

    document.querySelectorAll('.barbeiro-card')
    .forEach(b => b.classList.remove('selecionado'))

    el.classList.add('selecionado')

    barbeiroSelecionado = el.dataset.barbeiro

    tentarCarregarAgenda()
}


function tentarCarregarAgenda(){

    if(diaSelecionado && barbeiroSelecionado){

        htmx.ajax('POST','{% url "agenda_barbeiro_htmx" %}',{

            target:'#agenda',
            swap:'innerHTML',

            headers:{
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },

            values:{
                dia:diaSelecionado,
                barbeiro:barbeiroSelecionado
            }

        })

    }

}


function selecionarHorario(card){

    document.querySelectorAll('.horario-card').forEach(c => {

        c.classList.remove('selecionado')

        let btn = c.querySelector('.btn-agendar')
        if(btn){
            btn.disabled = true
        }

    })


    card.classList.add('selecionado')

    let btn = card.querySelector('.btn-agendar')

    if(btn){
        btn.disabled = false
    }

}


function confirmarAgendamento(event){

    event.stopPropagation()

    let card = event.target.closest('.horario-card')
    let horario = card.dataset.horario

    let dia = diaSelecionado
    let barbeiro = barbeiroSelecionado
    let servicoNome = document.getElementById('servicoNome').value
    let duracao = document.getElementById('servicoTempo').value

    let csrf = document.querySelector('[name=csrfmiddlewaretoken]').value

    let form = document.createElement('form')
    form.method = 'POST'
    form.action = "{% url 'confirmar_agendamento' %}"

    form.innerHTML = `
        <input type="hidden" name="csrfmiddlewaretoken" value="${csrf}">
        <input type="hidden" name="dia" value="${dia}">
        <input type="hidden" name="horario_inicio" value="${horario}">
        <input type="hidden" name="barbeiro" value="${barbeiro}">
        <input type="hidden" name="servico_nome" value="${servicoNome}">
        <input type="hidden" name="duracao" value="${duracao}">
    `

    document.body.appendChild(form)

    form.submit()

}
</script>

{% endblock %}
